schema: spec-driven

context: |
  Tech stack: Astro 4, TypeScript strict, Tailwind CSS, shadcn/ui
  Architecture: Static-first (SSG), no runtime server
  Testing: Vitest (unit), Playwright (e2e smoke)
  Style: Rioplatense Spanish UI copy, brand magenta #a81452 / crema #fbebde / naranja #f49d50

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing Astro component patterns
    tdd: false
    test_command: "npm run test"
  verify:
    test_command: "npm run test && npx playwright test"
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
